<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Title - Basic Template</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 0;
            padding: 60px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .icon {
            font-size: clamp(60px, 8vh, 100px);
            color: #667eea;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-size: clamp(48px, 6vh, 80px);
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 25px;
            line-height: 1.2;
        }
        
        .subtitle {
            font-size: clamp(26px, 3vh, 38px);
            color: #636e72;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .lesson-info {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(22px, 2.5vh, 30px);
            color: #2d3436;
            padding: 15px 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .info-icon {
            font-size: clamp(24px, 2.8vh, 34px);
            color: #667eea;
        }
        
        .divider {
            width: 120px;
            height: 5px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            margin: 40px auto;
            border-radius: 3px;
        }
        
        @media (max-width: 768px) {
            .lesson-info {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <i class="fas fa-book-open"></i>
        </div>
        
        <h1>Lập Trình Python Cơ Bản</h1>
        
        <div class="divider"></div>
        
        <div class="subtitle">Bài 1: Giới thiệu và Cài đặt</div>
        
        <div class="lesson-info">
            <div class="info-item">
                <i class="fas fa-user-graduate info-icon"></i>
                <span>Lớp 10A1</span>
            </div>
            <div class="info-item">
                <i class="fas fa-clock info-icon"></i>
                <span>45 phút</span>
            </div>
            <div class="info-item">
                <i class="fas fa-calendar-day info-icon"></i>
                <span>24/02/2026</span>
            </div>
        </div>
    </div>
</body>
</html>
