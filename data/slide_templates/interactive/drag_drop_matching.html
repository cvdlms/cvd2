<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Matching - Interactive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 0;
            padding: 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: clamp(38px, 4.5vh, 52px);
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: clamp(18px, 2vh, 24px);
            color: #636e72;
            text-align: center;
            margin-bottom: 35px;
        }
        
        .matching-area {
            display: grid;
            grid-template-columns: 1fr 100px 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .item-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            font-size: clamp(22px, 2.5vh, 28px);
            font-weight: 600;
            cursor: grab;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 80px;
        }
        
        .item-card:active {
            cursor: grabbing;
            transform: scale(1.05);
        }
        
        .item-card.dragging {
            opacity: 0.5;
            transform: rotate(5deg);
        }
        
        .answer-slot {
            background: #f5f7fa;
            border: 3px dashed #dfe6e9;
            padding: 25px;
            border-radius: 15px;
            font-size: clamp(22px, 2.5vh, 28px);
            font-weight: 600;
            color: #636e72;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 80px;
        }
        
        .answer-slot.drag-over {
            background: #e8f4f8;
            border-color: #667eea;
            transform: scale(1.05);
        }
        
        .answer-slot.filled {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: 3px solid #00f2fe;
            color: white;
        }
        
        .answer-slot.correct {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: 3px solid #38ef7d;
            animation: pulse-correct 0.6s ease;
        }
        
        .answer-slot.incorrect {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
            border: 3px solid #ff6a00;
            animation: shake 0.5s ease;
        }
        
        @keyframes pulse-correct {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .connection-line {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #dfe6e9;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            padding: 18px 40px;
            font-size: clamp(20px, 2.2vh, 26px);
            font-weight: 700;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .btn-check {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-check:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-reset {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
        }
        
        .result-box {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            font-size: clamp(22px, 2.5vh, 28px);
            font-weight: 700;
            margin-top: 25px;
            display: none;
        }
        
        .result-box.show {
            display: block;
            animation: slideDown 0.5s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .question-label {
            background: white;
            padding: 15px;
            border-radius: 10px;
            font-size: clamp(20px, 2.2vh, 26px);
            color: #2d3436;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .matching-area {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .connection-line {
                transform: rotate(90deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Ghép Đôi - Matching Game</h1>
        <div class="subtitle">Kéo thả các mục ở cột trái sang đúng vị trí ở cột phải</div>
        
        <div class="matching-area">
            <!-- Left Column - Questions -->
            <div class="column">
                <div class="question-label">📝 Câu hỏi</div>
                <div class="item-card" draggable="true" data-id="1">
                    1. Python
                </div>
                <div class="item-card" draggable="true" data-id="2">
                    2. JavaScript
                </div>
                <div class="item-card" draggable="true" data-id="3">
                    3. SQL
                </div>
                <div class="item-card" draggable="true" data-id="4">
                    4. HTML/CSS
                </div>
            </div>
            
            <!-- Middle Column - Arrows -->
            <div class="column connection-line">
                <i class="fas fa-arrows-alt-h"></i>
                <i class="fas fa-arrows-alt-h"></i>
                <i class="fas fa-arrows-alt-h"></i>
                <i class="fas fa-arrows-alt-h"></i>
            </div>
            
            <!-- Right Column - Answers -->
            <div class="column">
                <div class="question-label">✨ Đáp án</div>
                <div class="answer-slot" data-answer="1">
                    a. AI & Data Science
                </div>
                <div class="answer-slot" data-answer="2">
                    b. Web Frontend
                </div>
                <div class="answer-slot" data-answer="3">
                    c. Database Query
                </div>
                <div class="answer-slot" data-answer="4">
                    d. Web Design
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-check" onclick="checkAnswers()">
                <i class="fas fa-check-circle"></i> Kiểm Tra
            </button>
            <button class="btn btn-reset" onclick="resetGame()">
                <i class="fas fa-redo"></i> Làm Lại
            </button>
        </div>
        
        <div class="result-box" id="resultBox">
            <i class="fas fa-trophy"></i> Kết quả của bạn: <span id="scoreText"></span>
        </div>
    </div>
    
    <script>
        let draggedElement = null;
        let userAnswers = {};
        
        // Correct answers mapping
        const correctAnswers = {
            '1': '1',  // Python -> a
            '2': '2',  // JavaScript -> b
            '3': '3',  // SQL -> c
            '4': '4'   // HTML/CSS -> d
        };
        
        // Add drag event listeners to all cards
        document.querySelectorAll('.item-card').forEach(card => {
            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragend', handleDragEnd);
        });
        
        // Add drop event listeners to all slots
        document.querySelectorAll('.answer-slot').forEach(slot => {
            slot.addEventListener('dragover', handleDragOver);
            slot.addEventListener('drop', handleDrop);
            slot.addEventListener('dragleave', handleDragLeave);
        });
        
        function handleDragStart(e) {
            draggedElement = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }
        
        function handleDragEnd(e) {
            this.classList.remove('dragging');
        }
        
        function handleDragOver(e) {
            if (e.preventDefault) {
                e.preventDefault();
            }
            e.dataTransfer.dropEffect = 'move';
            this.classList.add('drag-over');
            return false;
        }
        
        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }
        
        function handleDrop(e) {
            if (e.stopPropagation) {
                e.stopPropagation();
            }
            
            this.classList.remove('drag-over');
            
            if (draggedElement) {
                // Store the answer
                const questionId = draggedElement.getAttribute('data-id');
                const answerId = this.getAttribute('data-answer');
                userAnswers[questionId] = answerId;
                
                // Update slot appearance
                this.classList.add('filled');
                this.classList.remove('correct', 'incorrect');
                
                // Remove the dragged card
                draggedElement.style.display = 'none';
            }
            
            return false;
        }
        
        function checkAnswers() {
            let correct = 0;
            let total = Object.keys(correctAnswers).length;
            
            // Check each answer
            document.querySelectorAll('.answer-slot').forEach(slot => {
                const answerId = slot.getAttribute('data-answer');
                
                // Find which question was placed here
                for (let questionId in userAnswers) {
                    if (userAnswers[questionId] === answerId) {
                        if (correctAnswers[questionId] === answerId) {
                            slot.classList.add('correct');
                            slot.classList.remove('incorrect');
                            correct++;
                        } else {
                            slot.classList.add('incorrect');
                            slot.classList.remove('correct');
                        }
                        break;
                    }
                }
            });
            
            // Show result
            const resultBox = document.getElementById('resultBox');
            const scoreText = document.getElementById('scoreText');
            scoreText.textContent = `${correct}/${total} đúng`;
            
            if (correct === total) {
                resultBox.innerHTML = '<i class="fas fa-trophy"></i> Xuất sắc! Bạn đã trả lời đúng tất cả!';
                resultBox.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
            } else if (correct >= total * 0.7) {
                resultBox.innerHTML = `<i class="fas fa-star"></i> Tốt lắm! Kết quả: ${correct}/${total}`;
                resultBox.style.background = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
            } else {
                resultBox.innerHTML = `<i class="fas fa-redo"></i> Hãy thử lại! Kết quả: ${correct}/${total}`;
                resultBox.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
            }
            
            resultBox.classList.add('show');
        }
        
        function resetGame() {
            // Reset all cards
            document.querySelectorAll('.item-card').forEach(card => {
                card.style.display = 'flex';
                card.classList.remove('dragging');
            });
            
            // Reset all slots
            document.querySelectorAll('.answer-slot').forEach(slot => {
                slot.classList.remove('filled', 'correct', 'incorrect', 'drag-over');
            });
            
            // Reset data
            userAnswers = {};
            
            // Hide result
            document.getElementById('resultBox').classList.remove('show');
        }
    </script>
</body>
</html>
