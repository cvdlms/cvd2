<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Slide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            padding: 60px;
        }
        .slide {
            max-width: 1200px;
            margin: 0 auto;
        }
        h2 {
            color: #2563eb;
            font-size: 2.5rem;
            margin-bottom: 30px;
            border-bottom: 4px solid #2563eb;
            padding-bottom: 15px;
        }
        ul {
            list-style: none;
        }
        li {
            font-size: 1.5rem;
            padding: 15px 0;
            padding-left: 40px;
            position: relative;
            color: #334155;
        }
        li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #2563eb;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            body { padding: 30px; }
            h2 { font-size: 2rem; }
            li { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>Chương trình tính chu vi hình tròn</h2>
        <ul>
            <li>Thông báo nhập bán kính r</li>
            <li>Nhập bán kính r</li>
            <li>Tính chu vi hình tròn: chuvi= r*2*3.14</li>
            <li>Hiển thị chuvi ra màn hình</li>
        </ul>
    </div>
</body>
</html>
