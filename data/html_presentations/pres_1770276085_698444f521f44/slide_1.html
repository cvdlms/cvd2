<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Columns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f8fafc;
            padding: 60px;
        }
        .slide {
            max-width: 1400px;
            margin: 0 auto;
        }
        h2 {
            color: #2563eb;
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
        }
        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .column {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .column h3 {
            color: #2563eb;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .column p {
            color: #64748b;
            font-size: 1.2rem;
            line-height: 1.8;
        }
        @media (max-width: 1024px) {
            .columns { grid-template-columns: 1fr; }
            body { padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="slide">
        <h2>So Sánh Hai Khái Niệm</h2>
        <div class="columns">
            <div class="column">
                <h3>Cột Trái</h3>
                <p>Nội dung cho phần bên trái. Mô tả chi tiết về khái niệm, phương pháp hoặc đặc điểm.</p>
            </div>
            <div class="column">
                <h3>Cột Phải</h3>
                <p>Nội dung cho phần bên phải. So sánh hoặc đối chiếu với phần bên trái.</p>
            </div>
        </div>
    </div>
</body>
</html>
