<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Image Slide</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .slide {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .slide img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 60px;
            color: white;
        }
        h2 {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.5rem;
            opacity: 0.9;
        }
        .placeholder {
            font-size: 10rem;
        }
        @media (max-width: 768px) {
            h2 { font-size: 2rem; }
            p { font-size: 1.2rem; }
            .overlay { padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="placeholder">🖼️</div>
        <!-- Thay bằng: <img src="your-image.jpg" alt="Description"> -->
        <div class="overlay">
            <h2>Tiêu Đề Hình Ảnh</h2>
            <p>Mô tả ngắn gọn về hình ảnh</p>
        </div>
    </div>
</body>
</html>
